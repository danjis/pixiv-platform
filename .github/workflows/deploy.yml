name: 一键自动部署 (CI/CD)

# 触发条件：当你 push 代码到 master 或 main 分支时自动触发
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用 GitHub 提供的一台免费 Linux 机器帮你干活

    steps:
    - name: 1. 拉取最新代码
      uses: actions/checkout@v3

    - name: 安装 Java JDK 21 (用于编译后端)
      uses: actions/setup-java@v3
      with:
        java-version: '21' # 项目采用的是 Java 21
        distribution: 'temurin'
        cache: 'maven'

    - name: 编译后端微服务 (Maven)
      run: |
        mvn clean package -DskipTests
        # 编译完成后，清理本地冗余产物只留 jar 包，以防传到服务器过慢
        find . -name "src" -type d -exec rm -rf {} +
        rm -rf ~/.m2/repository

    - name: 安装 Node.js 环境 (用于编译前端)
      uses: actions/setup-node@v3
      with:
        node-version: '20' # 修改为 20，以支持 Vite 7+ 和 @vitejs/plugin-vue 的要求

    - name: 3. 编译 user 前端
      run: |
        cd frontend/user
        npm install
        npm run build

    - name: 4. 编译 admin 前端
      run: |
        cd frontend/admin
        npm install
        npm run build

    - name: 5. 瘦身：删除云端的 node_modules (防止传到你的服务器太慢)
      run: |
        rm -rf frontend/user/node_modules
        rm -rf frontend/admin/node_modules

    - name: 6. 上传最新的代码+前端编译产物(dist) 到你的服务器
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        # source 为当前仓库的所有文件，因为刚才删了 node_modules，所以包很小
        source: "."
        # 对应你服务器上的绝对路径位置
        target: "/root/bs-3/pixiv-platform/"

    - name: 7. 通过 SSH 登录服务器，去触发你的部署脚本
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /root/bs-3
          # 给部署脚本赋权防止无法执行
          chmod +x deploy.sh
          # 执行你原本用来部署或重启的脚本
          ./deploy.sh
