name: 一键同步代码到服务器

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: pixiv-platform-sync
  cancel-in-progress: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v4

      - name: 2. 安装 Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: 3. 编译后端微服务
        run: |
          set -e
          mvn -B clean package -DskipTests

          # 只保留 Docker 构建镜像需要的 jar / Dockerfile / 资源文件
          rm -rf gateway-service/src
          rm -rf user-service/src
          rm -rf artwork-service/src
          rm -rf commission-service/src
          rm -rf notification-service/src
          rm -rf file-service/src

      - name: 4. 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 5. 编译 user 前端
        working-directory: frontend/user
        run: |
          set -e
          npm install
          npm run build

      - name: 6. 编译 admin 前端
        working-directory: frontend/admin
        run: |
          set -e
          npm install
          npm run build

      - name: 7. 删除前端依赖目录
        run: |
          rm -rf frontend/user/node_modules
          rm -rf frontend/admin/node_modules

      - name: 8. 上传运行所需文件到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "gateway-service,user-service,artwork-service,commission-service,notification-service,file-service,ai-service,frontend/user/dist,frontend/admin/dist,docker,nacos-configs"
          target: "/root/bs-3/pixiv-platform/"
          overwrite: true
          strip_components: 0
          timeout: 60s
          command_timeout: 20m