spring:
  application:
    name: user-service
  
  profiles:
    active: dev

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境使用 validate，不自动创建表
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # Jackson 配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /
  compression:
    enabled: true

# Actuator 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Feign 配置
feign:
  client:
    config:
      default:
        connect-timeout: 5000      # 连接超时时间（毫秒）
        read-timeout: 10000         # 读取超时时间（毫秒）
  circuitbreaker:
    enabled: true                   # 启用熔断器（降级功能）

# Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 日志配置（统一格式由 logback-spring.xml 管理）
logging:
  level:
    com.pixiv.user: DEBUG
    org.springframework.security: DEBUG
