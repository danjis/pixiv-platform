spring:
  application:
    name: gateway-service
  profiles:
    active: dev

  # 指定使用响应式 Web 应用类型（Gateway 必须使用 WebFlux）
  main:
    web-application-type: reactive

# 服务端口
server:
  port: 8080

# 日志配置（统一格式由 logback-spring.xml 管理）
logging:
  level:
    com.pixiv.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

# 限流开关（开发环境设为 false 关闭，生产环境改为 true）
rate-limit:
  enabled: false

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway  # 暴露健康检查和网关路由信息
  endpoint:
    health:
      show-details: always  # 显示详细健康信息

# Springdoc API 文档聚合配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: 用户服务
        url: /api/users/v3/api-docs
      - name: 作品服务
        url: /api/artworks/v3/api-docs
      - name: 委托服务
        url: /api/commissions/v3/api-docs
      - name: 通知服务
        url: /api/notifications/v3/api-docs
      - name: 文件服务
        url: /api/files/v3/api-docs
