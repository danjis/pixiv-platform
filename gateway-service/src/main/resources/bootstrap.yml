# Bootstrap 配置文件
# 此文件在 application.yml 之前加载，用于配置 Nacos 等基础设施

spring:
  application:
    name: gateway-service
  
  profiles:
    active: dev
  
  cloud:
    nacos:
      # Nacos 服务注册与发现配置
      discovery:
        server-addr: ${NACOS_ADDR:47.120.43.236:8848}  # Nacos 服务器地址
        namespace: dev  # 命名空间 ID（开发环境）
        username: nacos  # Nacos 用户名
        password: nacos  # Nacos 密码
        group: DEFAULT_GROUP  # 服务分组
        service: ${spring.application.name}  # 服务名称
        
      # Nacos 配置中心
      config:
        server-addr: ${NACOS_ADDR:47.120.43.236:8848}  # Nacos 配置中心地址
        namespace: dev  # 命名空间 ID
        username: nacos
        password: nacos
        file-extension: yml  # 配置文件格式
        group: DEFAULT_GROUP
        # 共享配置
        shared-configs:
          - data-id: shared-redis.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: shared-logging.yml
            group: DEFAULT_GROUP
            refresh: true
        # 扩展配置（网关专属配置）
        extension-configs:
          - data-id: ${spring.application.name}-${spring.profiles.active}.yml
            group: DEFAULT_GROUP
            refresh: true
