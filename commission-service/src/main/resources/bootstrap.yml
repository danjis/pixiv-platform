spring:
  application:
    name: commission-service
  
  profiles:
    active: dev
  
  cloud:
    # Nacos 服务注册与发现配置
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:47.120.61.152:8848}
        namespace: dev
        username: nacos
        password: nacos
        # 服务注册配置
        service: ${spring.application.name}
        ip: ${HOST_IP:localhost}
        port: 8083
        # 健康检查配置
        heart-beat-interval: 5000
        heart-beat-timeout: 15000
        # 元数据
        metadata:
          version: 1.0.0
          description: 约稿服务 - 约稿订单管理、企划管理、消息沟通
      
      # Nacos 配置中心配置
      config:
        server-addr: ${NACOS_ADDR:47.120.61.152:8848}
        namespace: dev
        username: nacos
        password: nacos
        file-extension: yml
        # 共享配置（从 Nacos 加载）
        shared-configs:
          - data-id: shared-mysql.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: shared-redis.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: shared-rabbitmq.yml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: shared-logging.yml
            group: DEFAULT_GROUP
            refresh: true
        extension-configs:
          - data-id: ${spring.application.name}-${spring.profiles.active}.yml
            group: DEFAULT_GROUP
            refresh: true
